<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>
      Nueva tarea 
    </ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
   <ion-item>
   <ion-input
   label= "Titulo"
   labelPlacement="stacked"
   [(ngModel)]="form.titulo"
   placeholder="ingrese el titular"
   ></ion-input>
   </ion-item>
   <ion-item>
   <ion-textarea
   label="Descripcion"
   labelPlacement="stacked"
   [(ngModel)]="form.titulo"
   placeholder="ingrese el titular"
   >
   </ion-textarea>
   </ion-item>
   <ion-item>
   <ion-input
   type="date"
   label="Fecha limite"
   labelPlacement="stacked"
   [(ngModel)]="form.fechaLimite"
   ></ion-input>
   </ion-item>
   </ion-content>


</ion-content>
